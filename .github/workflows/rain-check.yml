name: Rain Alert

on:
  schedule:
    # 北京时间 → UTC: 减 8 小时
    # 8:20  →  0:20 UTC
    # 13:50 →  5:50 UTC
    # 18:20 → 10:20 UTC
    - cron: "20 0,10 * * *"
    - cron: "50 5 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: '发送测试通知（跳过天气检查）'
        type: boolean
        default: true

jobs:
  check-rain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check weather and notify
        env:
          NOTIFY_METHOD: bark
          BARK_KEY: ${{ secrets.BARK_KEY }}
          TEST_MODE: ${{ inputs.test_mode && 'true' || 'false' }}
        run: python check_rain.py
